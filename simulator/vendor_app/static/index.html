<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0a0a14;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .card-expand {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            opacity: 0;
        }
        .card-expand.open {
            max-height: 1200px;
            opacity: 1;
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #f59e0b;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status-dot {
            animation: pulse-dot 2s ease-in-out infinite;
        }
        .status-dot.disconnected {
            animation: none;
        }
        textarea::-webkit-scrollbar {
            width: 6px;
        }
        textarea::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a14;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.12);
            border-radius: 4px;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0a0a14',
                            800: '#10101e',
                            700: '#181830',
                            600: '#1e1e3a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen text-gray-200">

    <!-- Header -->
    <header class="border-b border-gray-800/60 bg-dark-800/80 backdrop-blur-sm sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl">&#127981;</span>
                <h1 class="text-xl font-semibold text-white tracking-tight">Vendor Simulator</h1>
            </div>
            <div class="flex items-center gap-5">
                <div class="flex items-center gap-4 text-sm text-gray-400">
                    <span id="count-pending" class="flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-amber-500"></span>
                        <span>0 Pending</span>
                    </span>
                    <span id="count-replied" class="flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span>
                        <span>0 Sent</span>
                    </span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500 status-dot disconnected"></span>
                    <span id="status-text" class="text-xs text-gray-500">Disconnected</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Bulk Actions Bar -->
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button id="btn-reply-all" onclick="replyAll()"
                class="px-4 py-2 bg-amber-600 hover:bg-amber-500 text-white text-sm font-medium rounded-lg transition-colors flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h1m4 0h1m4 0h1m4 0h1M3 14h1m4 0h1m4 0h1m4 0h1M5 6l-2 4 2 4M19 6l2 4-2 4"/>
                </svg>
                Reply All Pending
            </button>
            <span id="reply-all-status" class="text-sm text-gray-500 hidden"></span>
        </div>
        <div class="flex items-center gap-2">
            <label for="auto-refresh" class="text-sm text-gray-400 cursor-pointer select-none">Auto-refresh</label>
            <button id="auto-refresh" onclick="toggleAutoRefresh()" role="switch"
                class="relative w-10 h-5 rounded-full bg-gray-700 transition-colors focus:outline-none">
                <span id="auto-refresh-knob"
                    class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-gray-400 transition-all"></span>
            </button>
        </div>
    </div>

    <!-- Request List -->
    <main class="max-w-5xl mx-auto px-6 pb-12">
        <div id="request-list" class="space-y-3">
            <!-- Cards rendered here -->
        </div>
        <div id="empty-state" class="hidden text-center py-20">
            <div class="text-4xl mb-4">&#128237;</div>
            <p class="text-gray-500 text-lg">No quote requests received yet</p>
            <p class="text-gray-600 text-sm mt-1">Requests will appear here when vendors are contacted</p>
        </div>
    </main>

    <script>
    // ── State ──────────────────────────────────────────────────
    let requests = [];
    let expandedId = null;
    let autoRefresh = true;
    let pollTimer = null;
    let connected = false;
    let generatingIds = new Set();

    // ── API ────────────────────────────────────────────────────
    const API = '';

    async function fetchRequests() {
        try {
            const res = await fetch(`${API}/api/requests`);
            if (!res.ok) throw new Error(res.statusText);
            requests = await res.json();
            setConnected(true);
            render();
        } catch (e) {
            setConnected(false);
        }
    }

    async function fetchStatus() {
        try {
            const res = await fetch(`${API}/api/status`);
            if (!res.ok) throw new Error(res.statusText);
            const data = await res.json();
            const c = data.counts || {};
            document.querySelector('#count-pending span:last-child').textContent = `${c.pending || 0} Pending`;
            document.querySelector('#count-replied span:last-child').textContent = `${c.sent || 0} Sent`;
            setConnected(true);
        } catch (e) {
            setConnected(false);
        }
    }

    async function generateReply(id) {
        id = Number(id);
        generatingIds.add(id);
        renderCard(id);
        try {
            const res = await fetch(`${API}/api/requests/${id}/generate-reply`, { method: 'POST' });
            if (!res.ok) throw new Error(res.statusText);
            const data = await res.json();
            const req = requests.find(r => r.id === id);
            if (req) {
                req.reply_body = data.reply_body;
                req.status = 'reply_ready';
            }
        } catch (e) {
            alert('Failed to generate reply: ' + e.message);
        } finally {
            generatingIds.delete(id);
            renderCard(id);
        }
    }

    async function sendReply(id) {
        id = Number(id);
        const textarea = document.getElementById(`reply-${id}`);
        const body = textarea ? textarea.value : '';
        try {
            const res = await fetch(`${API}/api/requests/${id}/send-reply`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reply_body: body })
            });
            if (!res.ok) throw new Error(res.statusText);
            const req = requests.find(r => r.id === id);
            if (req) {
                req.status = 'sent';
                req.reply_body = body;
                req.replied_at = new Date().toISOString();
            }
            render();
            fetchStatus();
        } catch (e) {
            alert('Failed to send reply: ' + e.message);
        }
    }

    async function replyAll() {
        const btn = document.getElementById('btn-reply-all');
        const status = document.getElementById('reply-all-status');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Processing...';
        status.classList.remove('hidden');
        status.textContent = 'Starting...';
        try {
            const res = await fetch(`${API}/api/requests/reply-all`, { method: 'POST' });
            if (!res.ok) throw new Error(res.statusText);
            const data = await res.json();
            if (data.total === 0) {
                status.textContent = 'No pending requests';
                btn.disabled = false;
                btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h1m4 0h1m4 0h1m4 0h1M3 14h1m4 0h1m4 0h1m4 0h1M5 6l-2 4 2 4M19 6l2 4-2 4"/></svg> Reply All Pending`;
                setTimeout(() => { status.classList.add('hidden'); }, 3000);
                return;
            }
            // Poll for progress
            const total = data.total;
            status.textContent = `Processing 0/${total}...`;
            const poll = setInterval(async () => {
                try {
                    const pr = await fetch(`${API}/api/requests/reply-all/status`);
                    const ps = await pr.json();
                    status.textContent = `Processing ${ps.processed}/${ps.total}...` + (ps.errors ? ` (${ps.errors} errors)` : '');
                    btn.innerHTML = `<span class="spinner"></span> ${ps.processed}/${ps.total}`;
                    if (!ps.running) {
                        clearInterval(poll);
                        status.textContent = `Done: ${ps.processed} processed` + (ps.errors ? `, ${ps.errors} errors` : '');
                        btn.disabled = false;
                        btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h1m4 0h1m4 0h1m4 0h1M3 14h1m4 0h1m4 0h1m4 0h1M5 6l-2 4 2 4M19 6l2 4-2 4"/></svg> Reply All Pending`;
                        await fetchRequests();
                        await fetchStatus();
                        setTimeout(() => { status.classList.add('hidden'); }, 5000);
                    }
                } catch (e) { /* poll failed, keep trying */ }
            }, 2000);
        } catch (e) {
            status.textContent = 'Error: ' + e.message;
            btn.disabled = false;
            btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h1m4 0h1m4 0h1m4 0h1M3 14h1m4 0h1m4 0h1m4 0h1M5 6l-2 4 2 4M19 6l2 4-2 4"/></svg> Reply All Pending`;
            setTimeout(() => { status.classList.add('hidden'); }, 5000);
        }
    }

    // ── Connection Status ──────────────────────────────────────
    function setConnected(state) {
        if (connected === state) return;
        connected = state;
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        if (state) {
            dot.className = 'w-2.5 h-2.5 rounded-full bg-green-500 status-dot';
            text.textContent = 'Connected';
            text.className = 'text-xs text-green-500';
        } else {
            dot.className = 'w-2.5 h-2.5 rounded-full bg-red-500 status-dot disconnected';
            text.textContent = 'Disconnected';
            text.className = 'text-xs text-gray-500';
        }
    }

    // ── Auto-refresh Toggle ────────────────────────────────────
    function toggleAutoRefresh() {
        autoRefresh = !autoRefresh;
        const btn = document.getElementById('auto-refresh');
        const knob = document.getElementById('auto-refresh-knob');
        if (autoRefresh) {
            btn.className = 'relative w-10 h-5 rounded-full bg-amber-600 transition-colors focus:outline-none';
            knob.className = 'absolute top-0.5 right-0.5 w-4 h-4 rounded-full bg-white transition-all';
            startPolling();
        } else {
            btn.className = 'relative w-10 h-5 rounded-full bg-gray-700 transition-colors focus:outline-none';
            knob.className = 'absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-gray-400 transition-all';
            stopPolling();
        }
    }

    function startPolling() {
        stopPolling();
        pollTimer = setInterval(() => {
            fetchRequests();
            fetchStatus();
        }, 3000);
    }

    function stopPolling() {
        if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
        }
    }

    // ── Rendering ──────────────────────────────────────────────
    function statusBadge(status) {
        const map = {
            pending:     { bg: 'bg-amber-500/15', text: 'text-amber-400', border: 'border-amber-500/30', label: 'Pending' },
            reply_ready: { bg: 'bg-blue-500/15',  text: 'text-blue-400',  border: 'border-blue-500/30',  label: 'Reply Ready' },
            sent:        { bg: 'bg-green-500/15', text: 'text-green-400', border: 'border-green-500/30', label: 'Sent' },
        };
        const s = map[status] || map.pending;
        return `<span class="px-2.5 py-0.5 text-xs font-medium rounded-full border ${s.bg} ${s.text} ${s.border}">${s.label}</span>`;
    }

    function timeAgo(dateStr) {
        if (!dateStr) return '';
        const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
        if (diff < 60) return 'just now';
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        return `${Math.floor(diff / 86400)}d ago`;
    }

    function materialCount(req) {
        // Derive from body if possible, otherwise show n/a
        const match = req.body?.match(/(\d+)\s*(line\s*items?|materials?|products?|items?)/i);
        return match ? match[1] : '--';
    }

    function renderCard(id) {
        id = Number(id);
        const card = document.getElementById(`card-${id}`);
        if (!card) return render();
        const req = requests.find(r => r.id === id);
        if (!req) return;
        const detail = card.querySelector('.card-expand');
        if (detail) detail.innerHTML = buildExpandedContent(req);
    }

    function buildExpandedContent(req) {
        const isGenerating = generatingIds.has(req.id);
        return `
            <div class="px-5 pb-5 pt-2 space-y-4">
                <div>
                    <label class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-1.5 block">Original Email Body</label>
                    <textarea readonly
                        class="w-full h-40 bg-dark-900 border border-gray-800 rounded-lg p-3 text-sm text-gray-300 resize-none focus:outline-none"
                    >${escHtml(req.body || '')}</textarea>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="generateReply('${req.id}')" ${isGenerating || req.status === 'sent' ? 'disabled' : ''}
                        class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-lg transition-colors flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
                        ${isGenerating
                            ? '<span class="spinner"></span> Generating...'
                            : `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
                               </svg> Generate AI Reply`}
                    </button>
                    ${req.status === 'sent'
                        ? '<span class="text-sm text-green-400">Reply sent ' + timeAgo(req.replied_at) + '</span>'
                        : ''}
                </div>
                <div>
                    <label class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-1.5 block">Reply</label>
                    <textarea id="reply-${req.id}" ${req.status === 'sent' ? 'readonly' : ''}
                        class="w-full h-48 bg-dark-900 border border-gray-800 rounded-lg p-3 text-sm text-gray-300 resize-none focus:outline-none focus:border-amber-600/50 ${req.status === 'sent' ? 'opacity-60' : ''}"
                        placeholder="Generate a reply or type one manually..."
                    >${escHtml(req.reply_body || '')}</textarea>
                </div>
                ${req.status !== 'sent' ? `
                <div class="flex justify-end">
                    <button onclick="sendReply('${req.id}')"
                        class="px-5 py-2 bg-green-600 hover:bg-green-500 text-white text-sm font-medium rounded-lg transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
                        </svg>
                        Send Reply
                    </button>
                </div>` : ''}
            </div>`;
    }

    function render() {
        const list = document.getElementById('request-list');
        const empty = document.getElementById('empty-state');

        if (!requests.length) {
            list.innerHTML = '';
            empty.classList.remove('hidden');
            return;
        }

        empty.classList.add('hidden');

        // Sort: pending first, then reply_ready, then sent; within group by received_at desc
        const order = { pending: 0, reply_ready: 1, sent: 2 };
        const sorted = [...requests].sort((a, b) => {
            const oa = order[a.status] ?? 0, ob = order[b.status] ?? 0;
            if (oa !== ob) return oa - ob;
            return new Date(b.received_at) - new Date(a.received_at);
        });

        list.innerHTML = sorted.map(req => {
            const isExpanded = expandedId === req.id;
            const borderColor = req.status === 'pending' ? 'border-amber-500/20'
                              : req.status === 'reply_ready' ? 'border-blue-500/20'
                              : 'border-green-500/20';
            return `
            <div id="card-${req.id}" class="bg-dark-800 border ${borderColor} rounded-xl overflow-hidden transition-all hover:border-gray-600/40">
                <div class="px-5 py-4 cursor-pointer select-none flex items-center justify-between gap-4"
                     onclick="toggleExpand('${req.id}')">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-3 mb-1.5">
                            <span class="font-medium text-white truncate">${escHtml(req.vendor_name || 'Unknown Vendor')}</span>
                            <span class="text-xs text-gray-500 truncate">${escHtml(req.vendor_email || req.from_email || '')}</span>
                        </div>
                        <div class="flex items-center gap-3 text-sm text-gray-400">
                            <span class="truncate max-w-xs">${escHtml(req.subject || 'No subject')}</span>
                            <span class="text-gray-600">|</span>
                            <span class="whitespace-nowrap">${materialCount(req)} items</span>
                            <span class="text-gray-600">|</span>
                            <span class="whitespace-nowrap text-gray-500">${timeAgo(req.received_at)}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 shrink-0">
                        ${statusBadge(req.status)}
                        <svg class="w-5 h-5 text-gray-600 transition-transform ${isExpanded ? 'rotate-180' : ''}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </div>
                </div>
                <div class="card-expand ${isExpanded ? 'open' : ''}">
                    ${isExpanded ? buildExpandedContent(req) : ''}
                </div>
            </div>`;
        }).join('');
    }

    function toggleExpand(id) {
        id = Number(id);
        expandedId = expandedId === id ? null : id;
        render();
    }

    function escHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ── Init ───────────────────────────────────────────────────
    (async function init() {
        // Set auto-refresh toggle to ON state
        toggleAutoRefresh(); // starts as false, this flips to true
        await Promise.all([fetchRequests(), fetchStatus()]);
    })();
    </script>
</body>
</html>
